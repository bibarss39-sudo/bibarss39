<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta property="og:site_name" content="Algorithmes & C">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Algorithmes & C",
      "alternateName": "تعلم لغة C والخوارزميات",
      "url": "https://bibarss39-sudo.github.io/bibarss39/"
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروس الخوارزميات — Hassan EL BAHI</title>
    <link rel="icon" type="image/png" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #10b981;
            --accent: #f59e0b;
            --yt-red: #ef4444;
            --bg-dark: #030712;
            --card-bg: rgba(30, 41, 59, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            font-family: 'Tajawal', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        .navbar {
            padding: 20px 5%;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-weight: 900;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-buttons { display: flex; gap: 12px; }

        .btn-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s var(--ease-out);
        }

        .btn-nav:hover {
            background: var(--primary);
            transform: translateY(-2px);
            border-color: var(--primary-light);
        }

        .hero {
            text-align: center;
            padding: 80px 20px 40px;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.8s var(--ease-out);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 60px;
        }

        .lang-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        .lesson-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.4s var(--ease-out);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .lesson-card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-banner {
            height: 8px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0;
            transition: width 0.6s var(--ease-out);
        }

        .lesson-card:hover .card-banner { width: 100%; }

        .card-body { padding: 32px; flex-grow: 1; display: flex; flex-direction: column; }

        .lesson-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .lesson-id {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .professor-tag {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lesson-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: white;
            line-height: 1.4;
        }

        .lesson-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .yt-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--yt-red);
            color: white;
            padding: 14px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .yt-link:hover {
            background: #cc0000;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid var(--border-subtle);
            background: rgba(3, 7, 18, 0.4);
        }

        footer p { color: var(--text-secondary); margin-bottom: 10px; }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .hero { padding-top: 40px; }
            .lessons-grid { grid-template-columns: 1fr; }
            .btn-nav span { display: none; }
            .btn-nav { padding: 10px; border-radius: 50%; width: 42px; height: 42px; justify-content: center; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="asasi.html" class="nav-brand">Algorithmes & C</a>
    <div class="nav-buttons">
        <a href="asasi.html" class="btn-nav">
            <i class="fas fa-home"></i>
            <span data-ar="الرئيسية" data-fr="Accueil" data-en="Home">الرئيسية</span>
        </a>
        <a href="https://www.youtube.com/@HassanELBAHI" target="_blank" class="btn-nav" style="color: var(--yt-red);">
            <i class="fab fa-youtube"></i>
            <span data-ar="قناة اليوتيوب" data-fr="YouTube" data-en="YouTube">قناة اليوتيوب</span>
        </a>
    </div>
</nav>

<main>
    <div class="hero">
        <h1 id="pageTitle">دروس الخوارزميات</h1>
        <p id="pageSubtitle">تعلم منطق البرمجة وبناء الخوارزميات خطوة بخطوة مع الأستاذ حسن الباهي من خلال سلسلة تعليمية شاملة واحترافية.</p>
    </div>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="switchLang('ar')">العربية</button>
        <button class="lang-btn" onclick="switchLang('fr')">Français</button>
        <button class="lang-btn" onclick="switchLang('en')">English</button>
    </div>

    <div class="lessons-grid" id="lessonsGrid">
        <!-- Lessons will be loaded by JS -->
    </div>
</main>

<footer>
    <p id="footerText">جميع الحقوق محفوظة © 2024 | تعلم البرمجة مع Algorithmes & C</p>
    <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
        <a href="#" style="color: var(--text-secondary);"><i class="fab fa-facebook-f"></i></a>
        <a href="#" style="color: var(--text-secondary);"><i class="fab fa-github"></i></a>
        <a href="#" style="color: var(--text-secondary);"><i class="fab fa-linkedin-in"></i></a>
    </div>
</footer>

<script>
    const lessons = [
        {
            id: 1,
            ar: { title: "ما هي الخوارزمية؟", desc: "تعريف الخوارزمية، تاريخها، خصائصها، وأهميتها في البرمجة وحل المشكلات." },
            fr: { title: "C'est quoi un algorithme ?", desc: "Définition, histoire, caractéristiques et importance dans la programmation." },
            en: { title: "What is an Algorithm?", desc: "Definition, history, characteristics and importance in programming and problem solving." },
            link: "https://youtu.be/m_yj2p6SCEM?si=SvSmZDn-ioY0sMGF"
        },
        {
            id: 2,
            ar: { title: "المتغيرات والثوابت", desc: "الفرق بين المتغير والثابت، أنواع البيانات، وكيفية استخدامها في تخزين المعلومات." },
            fr: { title: "Variables et Constantes", desc: "Différence entre variable et constante, types de données et stockage." },
            en: { title: "Variables and Constants", desc: "Difference between variable and constant, data types and data storage." },
            link: "https://youtu.be/ZHEqnG8eLI8?si=evxiM76rHtvB-Z5c"
        },
        {
            id: 3,
            ar: { title: "التعريف بالمتغيرات", desc: "طريقة تعريف المتغيرات والثوابت، قواعد التسمية، والنطاق في الخوارزميات." },
            fr: { title: "Déclaration des variables", desc: "Méthode de déclaration, règles de nommage et portée." },
            en: { title: "Declaring Variables", desc: "Declaration methods, naming rules and scope in algorithms." },
            link: "https://youtu.be/WrUoWImriI0?si=KsPNR-nPEvFSzY4H"
        },
        {
            id: 4,
            ar: { title: "عملية الإسناد (Affectation)", desc: "عملية إسناد القيم للمتغيرات، تحديث القيم، والعوامل الرياضية الأساسية." },
            fr: { title: "L'Affectation", desc: "Processus d'affectation, mise à jour des valeurs et opérateurs mathématiques." },
            en: { title: "Assignment (Affectation)", desc: "Process of assigning values, updating values and math operators." },
            link: "https://youtu.be/3_3E0AW3qJM?si=neEKLutuHH_JVoTx"
        },
        {
            id: 5,
            ar: { title: "التعليمات: Lire - Ecrire", desc: "كيفية قراءة المدخلات من المستخدم وكتابة المخرجات في الخوارزميات." },
            fr: { title: "Ecrire - Lire", desc: "Comment lire les entrées utilisateur et écrire les sorties." },
            en: { title: "Read - Write", desc: "How to read user inputs and write outputs in algorithms." },
            link: "https://youtu.be/zvhbb8KqczM?si=RBEFAJzM2S_zQTmX"
        },
        {
            id: 6,
            ar: { title: "هيكلية الخوارزمية", desc: "المكونات الأساسية للخوارزمية: البداية، الإعلانات، المعالجة، والنهاية." },
            fr: { title: "La structure d'un algorithme", desc: "Composants de base: début, déclarations, traitement et fin." },
            en: { title: "Algorithm Structure", desc: "Basic components: start, declarations, processing and end." },
            link: "https://youtu.be/w6s-CXq9zZ0?si=sTsbwkhfJZHKvZmN"
        },
        {
            id: 7,
            ar: { title: "التعليقات (Comments)", desc: "أهمية التعليقات في البرمجة، كيفية كتابتها، وتحسين قابلية قراءة الكود." },
            fr: { title: "Les commentaires", desc: "Importance des commentaires, comment les écrire et lisibilité." },
            en: { title: "Comments", desc: "Importance of comments, how to write them and code readability." },
            link: "https://youtu.be/J92BbddBw64?si=EpxaUG10QCmxblBT"
        },
        {
            id: 8,
            ar: { title: "التعبيرات الحسابية", desc: "التعبيرات الحسابية، الأولويات، والدوال الرياضية الأساسية." },
            fr: { title: "Expressions arithmétiques", desc: "Expressions mathématiques, priorités et fonctions de base." },
            en: { title: "Arithmetic Expressions", desc: "Math expressions, priorities and basic functions." },
            link: "https://youtu.be/gGXSxPkD0P0?si=NrFdcyh-O6L7HWe2"
        },
        {
            id: 9,
            ar: { title: "عوامل المقارنة", desc: "عوامل المقارنة واستخدامها في اتخاذ القرارات المنطقية." },
            fr: { title: "Expressions de comparaison", desc: "Opérateurs de comparaison et décisions logiques." },
            en: { title: "Comparison Operators", desc: "Comparison operators and logical decisions." },
            link: "https://youtu.be/PvKMleuBiAo?si=TRPraovcA8IlMOFP"
        },
        {
            id: 10,
            ar: { title: "التعبيرات المنطقية", desc: "العمليات المنطقية (AND, OR, NOT) وجداول الحقيقة والتعبيرات المركبة." },
            fr: { title: "Expressions logiques", desc: "Opérations logiques (ET, OU, NON) et tables de vérité." },
            en: { title: "Logical Expressions", desc: "Logical operations (AND, OR, NOT) and truth tables." },
            link: "https://youtu.be/UV6B3AW6h50?si=NOsytgvhp9bTi93f"
        },
        {
            id: 11,
            ar: { title: "الجمل الشرطية البسيطة", desc: "الهياكل الشرطية البسيطة وكيفية اتخاذ القرارات في البرمجة." },
            fr: { title: "Si ... Alors ... Fin Si", desc: "Structures conditionnelles simples et prise de décision." },
            en: { title: "Simple Conditionals", desc: "Simple conditional structures and decision making." },
            link: "https://youtu.be/9KAgoYwUH4s?si=F3aFmq8UTL0Ncer_"
        },
        {
            id: 12,
            ar: { title: "الجمل الشرطية البديلة", desc: "الهياكل الشرطية البديلة مع خيارين أو أكثر ومعالجة الحالات." },
            fr: { title: "Si ... Alors ... Sinon", desc: "Structures alternatives avec deux options ou plus." },
            en: { title: "Alternative Conditionals", desc: "Alternative structures with two or more options." },
            link: "https://youtu.be/S3V-dhUbaRo?si=Lv73FOwB0GvMiZAx"
        }
    ];

    const translations = {
        ar: {
            title: "دروس الخوارزميات",
            subtitle: "تعلم منطق البرمجة وبناء الخوارزميات خطوة بخطوة مع الأستاذ حسن الباهي من خلال سلسلة تعليمية شاملة واحترافية.",
            watch: "مشاهدة الدرس على يوتيوب",
            footer: "جميع الحقوق محفوظة © 2024 | تعلم البرمجة مع Algorithmes & C"
        },
        fr: {
            title: "Cours d'Algorithmique",
            subtitle: "Apprenez la logique de programmation étape par étape avec le professeur Hassan EL BAHI.",
            watch: "Regarder sur YouTube",
            footer: "Tous droits réservés © 2024 | Algorithmes & C"
        },
        en: {
            title: "Algorithm Lessons",
            subtitle: "Learn programming logic step by step with Professor Hassan EL BAHI.",
            watch: "Watch on YouTube",
            footer: "All rights reserved © 2024 | Algorithmes & C"
        }
    };

    let currentLang = 'ar';

    function switchLang(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        
        // Update buttons
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.toLowerCase().includes(lang) || (lang === 'ar' && btn.textContent === 'العربية'));
        });

        // Update titles
        document.getElementById('pageTitle').textContent = translations[lang].title;
        document.getElementById('pageSubtitle').textContent = translations[lang].subtitle;
        document.getElementById('footerText').textContent = translations[lang].footer;

        // Update navigation spans
        document.querySelectorAll('[data-ar]').forEach(span => {
            span.textContent = span.getAttribute(`data-${lang}`);
        });

        renderLessons();
    }

    function renderLessons() {
        const grid = document.getElementById('lessonsGrid');
        grid.innerHTML = '';

        lessons.forEach(lesson => {
            const card = document.createElement('div');
            card.className = 'lesson-card';
            card.innerHTML = `
                <div class="card-banner"></div>
                <div class="card-body">
                    <div class="lesson-meta">
                        <div class="lesson-id">${lesson.id}</div>
                        <div class="professor-tag"><i class="fas fa-user-tie"></i> Hassan EL BAHI</div>
                    </div>
                    <h3 class="lesson-title">${lesson[currentLang].title}</h3>
                    <p class="lesson-desc">${lesson[currentLang].desc}</p>
                    <a href="${lesson.link}" target="_blank" class="yt-link">
                        <i class="fab fa-youtube"></i>
                        <span>${translations[currentLang].watch}</span>
                    </a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Initial load
    window.onload = () => switchLang('ar');
</script>

</body>
</html>
