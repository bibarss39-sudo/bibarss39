15:{
  title:{ar:'#include',fr:'#include',en:'#include'},
  exp:{
    ar:`📌 الاستخدام:
#include يُدرج محتوى ملف ترويسة قبل التجميع.

💡 المكتبات الأشهر:
#include <stdio.h>   // printf, scanf, fgets...
#include <stdlib.h>  // malloc, free, rand, exit...
#include <string.h>  // strlen, strcpy, strcmp...
#include <math.h>    // sqrt, pow, fabs, sin...
#include <stdbool.h> // bool, true, false (C99)

💡 الفرق بين <> و "":
#include <stdio.h>   // مكتبة نظام (في مجلد النظام)
#include "myfunc.h"  // ملفك الخاص (في نفس المجلد)

⚠️ ترتيب الإدراج:
1. #include أولاً
2. #define ثانياً
3. الدوال ثالثاً
4. main() أخيراً`,
    fr:`📌 Usage:
#include insère le contenu d'un fichier en-tête.

💡 Bibliothèques principales:
#include <stdio.h>   // printf, scanf...
#include <stdlib.h>  // malloc, free, rand...
#include <string.h>  // strlen, strcpy...
#include <math.h>    // sqrt, pow, sin...
#include <stdbool.h> // bool, true, false

💡 Différence <> vs "":
<stdio.h>  → bibliothèque système
"myfunc.h" → votre fichier (même dossier)`,
    en:`📌 Usage:
#include inserts a header file before compilation.

💡 Main libraries:
#include <stdio.h>   // printf, scanf...
#include <stdlib.h>  // malloc, free, rand...
#include <string.h>  // strlen, strcpy...
#include <math.h>    // sqrt, pow, sin...
#include <stdbool.h> // bool, true, false

💡 Difference <> vs "":
<stdio.h>  → system library
"myfunc.h" → your file (same directory)`
  },
  algFr:`// Étape préprocesseur (conceptuel):
// 1. Lire "#include <stdio.h>"
// 2. Trouver le fichier stdio.h sur le disque
// 3. Copier son contenu ici
// 4. Compiler le tout

// Ordre recommandé dans le fichier:
#include <stdio.h>    // ← en premier
#include <string.h>
#define MAX 100       // ← ensuite les constantes
int maFonction() { } // ← puis les fonctions
int main() { }       // ← main en dernier`,
  algExp:{
    ar:`🔗 المفهوم:
الخوارزمية لا تحتاج #include
لكن في C كل دالة تأتي من مكتبة

📌 القاعدة:
استخدمتَ printf/scanf → أضف stdio.h
استخدمتَ strlen       → أضف string.h
استخدمتَ sqrt         → أضف math.h`,
    fr:`🔗 Concept:
L'algo n'a pas besoin de #include
Mais en C, chaque fonction vient d'une bibliothèque

📌 La règle:
Utiliser printf/scanf → ajouter stdio.h
Utiliser strlen       → ajouter string.h
Utiliser sqrt         → ajouter math.h`,
    en:`🔗 Concept:
Algorithm doesn't need #include
But in C, every function comes from a library

📌 The rule:
Use printf/scanf → add stdio.h
Use strlen       → add string.h
Use sqrt         → add math.h`
  },
  category:'control'
},

16:{
  title:{ar:'return 0;',fr:'return 0;',en:'return 0;'},
  exp:{
    ar:`📌 الاستخدام:
return يُنهي الدالة الحالية ويُعيد قيمة للمُستدعي.

💡 في main():
return 0;  // نجاح — البرنامج انتهى بدون أخطاء
return 1;  // فشل عام
return -1; // فشل مخصَّص

💡 في الدوال الأخرى:
int square(int n) { return n*n; }
bool isPositive(int n) { return n > 0; }
void greet() { printf("سلام"); return; } // اختياري

⚠️ تذكَّر:
• return يُنهي الدالة فوراً
• أي كود بعد return لا يُنفَّذ
• نوع القيمة يجب مطابقة نوع الإرجاع`,
    fr:`📌 Usage:
return termine la fonction et retourne une valeur.

💡 Dans main():
return 0;   // succès
return 1;   // échec général
return -1;  // échec personnalisé

💡 Dans d'autres fonctions:
int carre(int n) { return n*n; }
bool isPositive(int n) { return n > 0; }

⚠️ Rappel:
• return termine la fonction immédiatement
• Le code après return n'est jamais exécuté`,
    en:`📌 Usage:
return ends the current function and returns a value.

💡 In main():
return 0;   // success
return 1;   // general failure
return -1;  // custom failure

💡 In other functions:
int square(int n) { return n*n; }
bool isPositive(int n) { return n > 0; }

⚠️ Remember:
• return ends the function immediately
• Code after return is never executed`
  },
  algFr:`Algorithme Principal
Début
    // ... instructions ...
    Retourner 0    ← return 0;
Fin

// Dans une fonction:
Fonction Carré(n) : Entier
Début
    Retourner n × n  ← return n*n;
Fin`,
  algExp:{
    ar:`🔗 الربط:
"أرجع 0" في الخوارزمية → return 0; في C

📌 معاني أكواد الإرجاع:
0  → نجاح (Exit Success)
1  → خطأ عام
-1 → خطأ مخصَّص
(يمكن استخدام return EXIT_SUCCESS من stdlib.h)`,
    fr:`🔗 Lien:
"Retourner 0" en algo → return 0; en C

📌 Signification des codes:
0  → succès (EXIT_SUCCESS)
1  → erreur générale
-1 → erreur personnalisée`,
    en:`🔗 Link:
"Return 0" in algorithm → return 0; in C

📌 Return code meanings:
0  → success (EXIT_SUCCESS)
1  → general error
-1 → custom error`
  },
  category:'control'
},

23:{
  title:{ar:'break;',fr:'break;',en:'break;'},
  exp:{
    ar:`📌 الاستخدام:
break يخرج فوراً من الحلقة أو switch الحالية.

💡 في الحلقات:
for(int i=0; i<100; i++) {
    if(i == 5) break;   // خروج عند i=5
    printf("%d ", i);
}
// يطبع: 0 1 2 3 4

💡 في البحث (استخدام شائع):
for(int i=0; i<n; i++) {
    if(arr[i] == target) {
        printf("وُجد في [%d]\\n", i);
        break;  // لا داعي للاستمرار
    }
}

⚠️ تذكَّر:
• break لا يخرج من الدالة (فقط الحلقة)
• يُغادر الحلقة المباشرة فقط (ليس المتداخلة)`,
    fr:`📌 Usage:
break sort immédiatement de la boucle ou switch.

💡 Dans les boucles:
for(int i=0; i<100; i++) {
    if(i == 5) break;
    printf("%d ", i);
}
// affiche: 0 1 2 3 4

💡 Dans une recherche:
for(int i=0; i<n; i++) {
    if(arr[i] == target) {
        printf("Trouvé en [%d]\\n", i);
        break;
    }
}`,
    en:`📌 Usage:
break immediately exits the current loop or switch.

💡 In loops:
for(int i=0; i<100; i++) {
    if(i == 5) break;
    printf("%d ", i);
}
// prints: 0 1 2 3 4

💡 In search:
for(int i=0; i<n; i++) {
    if(arr[i] == target) {
        printf("Found at [%d]\\n", i);
        break;
    }
}`
  },
  algFr:`Algorithme RechercheSéquentielle
Variables arr[n], cible, i : Entiers
Début
    Pour i de 0 à n-1 Faire
        Si arr[i] = cible Alors
            Écrire("Trouvé à", i)
            Quitter   ← break en C
        FinSi
    FinPour
Fin`,
  algExp:{
    ar:`🔗 الربط:
"اخرج" أو "توقف" في الخوارزمية → break; في C

📌 كفاءة البحث مع break:
بدون break → تفحص كل العناصر دائماً
مع break   → تتوقف عند العثور على القيمة`,
    fr:`🔗 Lien:
"Quitter" ou "Sortir" en algo → break; en C

📌 Efficacité avec break:
Sans break → toujours parcourir tout
Avec break → s'arrêter dès qu'on trouve`,
    en:`🔗 Link:
"Exit" or "Quit" in algorithm → break; in C

📌 Efficiency with break:
Without break → always scan everything
With break   → stop as soon as found`
  },
  category:'control'
},

24:{
  title:{ar:'continue;',fr:'continue;',en:'continue;'},
  exp:{
    ar:`📌 الاستخدام:
continue يتخطى الدورة الحالية ويبدأ التالية.

💡 مثال — طباعة الأعداد الفردية فقط:
for(int i=0; i<10; i++) {
    if(i % 2 == 0) continue;  // تخطَّ الزوجية
    printf("%d ", i);
}
// يطبع: 1 3 5 7 9

💡 مثال — تجاهل القيم السالبة:
for(int i=0; i<n; i++) {
    if(arr[i] < 0) continue;
    sum += arr[i];
}

🆚 الفرق بين break و continue:
break    → يُنهي الحلقة نهائياً
continue → يتخطى الدورة ويكمل الحلقة`,
    fr:`📌 Usage:
continue saute l'itération actuelle.

💡 Exemple — nombres impairs:
for(int i=0; i<10; i++) {
    if(i%2==0) continue;
    printf("%d ", i);
}
// affiche: 1 3 5 7 9

🆚 break vs continue:
break    → termine la boucle définitivement
continue → saute seulement l'itération actuelle`,
    en:`📌 Usage:
continue skips the current iteration.

💡 Example — odd numbers only:
for(int i=0; i<10; i++) {
    if(i%2==0) continue;
    printf("%d ", i);
}
// prints: 1 3 5 7 9

🆚 break vs continue:
break    → ends loop permanently
continue → skips current iteration only`
  },
  algFr:`Algorithme NombresFiltres
Variable i : Entier
Début
    Pour i de 0 à 9 Faire
        Si (i mod 2 = 0) Alors
            Passer au suivant  ← continue
        FinSi
        Écrire(i, " ")
    FinPour
Fin`,
  algExp:{
    ar:`🔗 الربط:
"انتقل للتالي" أو "تخطَّ" → continue; في C

📌 استخدام ذكي:
بدلاً من كتابة:
if(cond) { ... }  // كتلة كاملة

يمكن كتابة:
if(!cond) continue;
// ... باقي الكود (أوضح وأقل تداخلاً)`,
    fr:`🔗 Lien:
"Passer au suivant" → continue; en C

📌 Usage élégant:
Au lieu de:
if(cond) { ... }

On peut écrire:
if(!cond) continue;
// ... reste du code (moins imbriqué)`,
    en:`🔗 Link:
"Skip to next" → continue; in C

📌 Elegant usage:
Instead of:
if(cond) { ... }

Write:
if(!cond) continue;
// ... rest of code (less nesting)`
  },
  category:'control'
},

27:{
  title:{ar:'#include <stdio.h>',fr:'#include <stdio.h>',en:'#include <stdio.h>'},
  exp:{
    ar:`📌 ما يُقدِّمه stdio.h:
دوال الإدخال/الإخراج القياسية.

💡 الدوال الرئيسية:
printf()   → طباعة على الشاشة
scanf()    → قراءة من لوحة المفاتيح
fgets()    → قراءة سطر نصي (آمن)
puts()     → طباعة نص + سطر جديد
getchar()  → قراءة حرف واحد
fopen/fclose → فتح/إغلاق ملفات

💡 بدون stdio.h:
#include <stdio.h>  ← بدون هذا
int main() {
    printf("مرحبا");  // ← خطأ! المترجم لا يعرف printf
    return 0;
}

⚠️ دائماً في السطر الأول تقريباً في كل برنامج C!`,
    fr:`📌 Ce que fournit stdio.h:
Fonctions d'entrées/sorties standard.

💡 Fonctions principales:
printf()   → afficher à l'écran
scanf()    → lire depuis le clavier
fgets()    → lire une ligne (sécurisé)
puts()     → afficher + nouvelle ligne
getchar()  → lire un caractère
fopen/fclose → ouvrir/fermer fichiers

⚠️ Toujours en première ligne (presque) de tout programme C!`,
    en:`📌 What stdio.h provides:
Standard input/output functions.

💡 Main functions:
printf()   → display on screen
scanf()    → read from keyboard
fgets()    → read a line (safe)
puts()     → print + newline
getchar()  → read one character
fopen/fclose → open/close files

⚠️ Always (nearly) first line of every C program!`
  },
  algFr:`// Ce qui se passe avant la compilation:
//
// Étape 1: Le préprocesseur lit "#include <stdio.h>"
// Étape 2: Il trouve le fichier stdio.h
// Étape 3: Il le copie dans votre programme
// Étape 4: Le compilateur compile tout ensemble
//
// C'est AVANT l'exécution (pas pendant!)

#include <stdio.h>   // ← toujours ici
int main() {
    printf("Hello!\\n");
    return 0;
}`,
  algExp:{
    ar:`🔗 المفهوم:
#include لا تُوجَد في الخوارزمية لأنها تقنية
لكنها ضرورية في كل برنامج C!

📌 القاعدة البسيطة:
إذا استخدمتَ printf أو scanf
→ أضف #include <stdio.h> في الأعلى!`,
    fr:`🔗 Concept:
#include n'existe pas en algo car c'est technique
Mais obligatoire dans tout programme C!

📌 Règle simple:
Si vous utilisez printf ou scanf
→ Ajouter #include <stdio.h> en haut!`,
    en:`🔗 Concept:
#include doesn't exist in algorithm as it's technical
But required in every C program!

📌 Simple rule:
If you use printf or scanf
→ Add #include <stdio.h> at the top!`
  },
  category:'control'
},

28:{
  title:{ar:'#include <stdbool.h>',fr:'#include <stdbool.h>',en:'#include <stdbool.h>'},
  exp:{
    ar:`📌 الاستخدام:
يُفعِّل النوع المنطقي bool والقيمتين true وfalse.

💡 قبل وبعد stdbool.h:
// بدونه: نستخدم int
int isEven = (n%2 == 0);  // 1 أو 0

// معه: أوضح وأكثر تعبيراً
#include <stdbool.h>
bool isEven = (n%2 == 0);  // true أو false

💡 يُستخدم في:
• دوال الفحص: Automorphe, IsPrime, IsEven
• إشارات الحالة: bool found, bool done
• نتائج الشروط المعقدة

⚠️ متاح من معيار C99 فصاعداً
(مع خيار التجميع: gcc -std=c99)`,
    fr:`📌 Usage:
Active le type bool et true/false (C99).

💡 Avant/après stdbool.h:
// Sans: utiliser int
int isEven = (n%2 == 0);

// Avec: plus clair
#include <stdbool.h>
bool isEven = (n%2 == 0);

💡 Utilisé pour:
• Fonctions de vérification
• Indicateurs d'état
• Résultats de conditions complexes`,
    en:`📌 Usage:
Enables bool type and true/false literals (C99).

💡 Before/after stdbool.h:
// Without: use int
int isEven = (n%2 == 0);

// With: clearer
#include <stdbool.h>
bool isEven = (n%2 == 0);

💡 Used for:
• Check functions
• State flags
• Complex condition results`
  },
  algFr:`Inclusion (pseudo-code conceptuel):
  Si besoin de booléens lisibles
    Alors ajouter: #include <stdbool.h>
  Sinon (ancien C ou sans C99)
    Utiliser int: 0=faux, 1=vrai

// Exemple d'utilisation:
#include <stdio.h>
#include <stdbool.h>
bool IsPrime(int n) {
    if(n<2) return false;
    for(int i=2; i*i<=n; i++)
        if(n%i==0) return false;
    return true;
}`,
  algExp:{
    ar:`🔗 الربط:
"الدالة ترجع منطقي" في الخوارزمية
→ يتطلب bool → يتطلب #include <stdbool.h>

📌 ترتيب الإدراج:
#include <stdio.h>    // أولاً
#include <stdbool.h>  // ثانياً
... باقي المكتبات ...`,
    fr:`🔗 Lien:
"La fonction retourne booléen" en algo
→ nécessite bool → nécessite #include <stdbool.h>

📌 Ordre d'inclusion:
#include <stdio.h>    // en premier
#include <stdbool.h>  // ensuite`,
    en:`🔗 Link:
"Function returns boolean" in algorithm
→ needs bool → needs #include <stdbool.h>

📌 Inclusion order:
#include <stdio.h>    // first
#include <stdbool.h>  // then`
  },
  category:'control'
},

35:{
  title:{ar:'int Compter(int n)',fr:'int Compter(int n)',en:'int Compter(int n)'},
  exp:{
    ar:`📌 تشريح رأس الدالة:
int  Compter  (int n)
───  ───────  ──────
↑      ↑         ↑
نوع   الاسم    المعاملات

1. int → نوع القيمة المُرجَعة (عدد الأرقام)
2. Compter → اسم الدالة (وصفي)
3. (int n) → معامل واحد: نسخة من العدد

💡 الدالة كاملة:
int Compter(int n) {
    if(n==0) return 1;
    int count=0;
    while(n!=0){ count++; n/=10; }
    return count;
}

💡 الاستدعاء:
int digits = Compter(762); // digits=3`,
    fr:`📌 Anatomie de l'en-tête:
int  Compter  (int n)
↑    ↑        ↑
Type Nom      Paramètres

1. int → type de retour (nb de chiffres)
2. Compter → nom descriptif
3. (int n) → une copie du nombre

💡 Appel:
int digits = Compter(762); // digits=3`,
    en:`📌 Function header anatomy:
int  Compter  (int n)
↑    ↑        ↑
Type Name     Parameters

1. int → return type (digit count)
2. Compter → descriptive name
3. (int n) → one copy of the number

💡 Calling:
int digits = Compter(762); // digits=3`
  },
  algFr:`Fonction Compter(n) : Entier
Début
    Si n = 0 alors Retourner 1
    nbr ← 0
    Tant que n ≠ 0 Faire
        nbr ← nbr + 1
        n ← n div 10
    FinTantQue
    Retourner nbr
Fin

// Chaque ligne algo ≈ une ligne C:
// "Fonction Compter(n):Entier" = "int Compter(int n){"
// "Retourner nbr"              = "return nbr;"`,
  algExp:{
    ar:`🔗 ترجمة خط بخط:
"دالة Compter(n): عدد صحيح"
→ int Compter(int n) {

"أرجع nbr"
→ return nbr;

"نهاية الدالة"
→ } (قوس إغلاق)`,
    fr:`🔗 Traduction ligne par ligne:
"Fonction Compter(n): Entier"
→ int Compter(int n) {

"Retourner nbr"
→ return nbr;

"Fin"
→ }`,
    en:`🔗 Line-by-line translation:
"Function Compter(n): Integer"
→ int Compter(int n) {

"Return nbr"
→ return nbr;

"End"
→ }`
  },
  category:'control'
},

36:{
  title:{ar:'return 1;',fr:'return 1;',en:'return 1;'},
  exp:{
    ar:`📌 الاستخدام في Compter:
إذا كان n == 0 → العدد 0 له رقم واحد
نُرجع 1 مباشرةً دون دخول الحلقة.

💡 الكود:
int Compter(int n) {
    if(n == 0) return 1;  // ← هنا
    int c=0;
    while(n!=0){ c++; n/=10; }
    return c;
}

💡 قاعدة مهمة:
return يُنهي الدالة فوراً!
كل ما بعده لا يُنفَّذ.

🆚 الفرق:
return 0  في main()    → البرنامج نجح
return 1  في Compter() → "عدد الأرقام = 1"`,
    fr:`📌 Usage dans Compter:
Si n == 0 → le nombre 0 a un seul chiffre
On retourne 1 directement sans boucle.

💡 Règle importante:
return termine la fonction immédiatement!
Ce qui suit n'est jamais exécuté.

🆚 Différence:
return 0  dans main()    → succès du programme
return 1  dans Compter() → "nb de chiffres = 1"`,
    en:`📌 Usage in Compter:
If n == 0 → the number 0 has one digit
Return 1 directly without entering the loop.

💡 Important rule:
return ends the function immediately!
Nothing after it executes.

🆚 Difference:
return 0  in main()    → program success
return 1  in Compter() → "digit count = 1"`
  },
  algFr:`Fonction Compter(n) : Entier
Début
    Si n = 0 alors
        Retourner 1   ← return 1; en C
        // Fin immédiate de la fonction
    FinSi
    // Suite: compter les chiffres...
Fin`,
  algExp:{
    ar:`🔗 الربط:
"أرجع 1 وانتهِ" في الخوارزمية → return 1; في C

📌 لماذا الحالة الخاصة للصفر؟
بدونها: while(0!=0) لا تعمل → count=0 (خطأ!)
معها:   نُرجع 1 مباشرةً (صحيح ✓)`,
    fr:`🔗 Lien:
"Retourner 1" en algo → return 1; en C

📌 Pourquoi le cas spécial pour zéro?
Sans: while(0!=0) ne s'exécute pas → count=0 (faux!)
Avec: on retourne 1 directement (correct ✓)`,
    en:`🔗 Link:
"Return 1" in algorithm → return 1; in C

📌 Why special case for zero?
Without: while(0!=0) doesn't run → count=0 (wrong!)
With: return 1 directly (correct ✓)`
  },
  category:'control'
},

37:{
  title:{ar:'bool Automorphe(int n)',fr:'bool Automorphe(int n)',en:'bool Automorphe(int n)'},
  exp:{
    ar:`📌 العدد الأوتومورف:
عدد مربعه ينتهي بنفس أرقامه.
مثال: 25² = 625 ✓ | 76² = 5776 ✓

💡 خوارزمية الفحص:
bool Automorphe(int n) {
    int carre = n * n;
    int nbr   = n;
    int k     = Compter(n);
    for(int i=0; i<k; i++) {
        if(carre%10 != nbr%10)
            return false;  // رقم مختلف → لا
        carre /= 10;
        nbr   /= 10;
    }
    return true;  // كل الأرقام تطابقت → نعم
}

💡 الأعداد الأوتومورفية حتى 100:
1, 5, 6, 25, 76`,
    fr:`📌 Nombre automorphe:
Son carré se termine par ses propres chiffres.
Exemple: 25² = 625 ✓ | 76² = 5776 ✓

💡 Algorithme:
bool Automorphe(int n) {
    int carre=n*n, nbr=n, k=Compter(n);
    for(int i=0;i<k;i++){
        if(carre%10!=nbr%10) return false;
        carre/=10; nbr/=10;
    }
    return true;
}

💡 Automorphes ≤ 100: 1,5,6,25,76`,
    en:`📌 Automorphic number:
Its square ends with its own digits.
Example: 25² = 625 ✓ | 76² = 5776 ✓

💡 Algorithm:
bool Automorphe(int n) {
    int sq=n*n, nbr=n, k=Compter(n);
    for(int i=0;i<k;i++){
        if(sq%10!=nbr%10) return false;
        sq/=10; nbr/=10;
    }
    return true;
}

💡 Automorphic ≤ 100: 1,5,6,25,76`
  },
  algFr:`Fonction Automorphe(n) : Booléen
  carre ← n × n
  nbChiffres ← Compter(n)
  Pour i de 1 à nbChiffres Faire
    Si (carre mod 10) ≠ (n mod 10)
      Retourner Faux
    carre ← carre div 10
    n     ← n div 10
  FinPour
  Retourner Vrai`,
  algExp:{
    ar:`🔗 الخطوة بخطوة لـ n=25:
carre=625, k=2
Tour 1: 625%10=5, 25%10=5 ✓ carre=62,n=2
Tour 2: 62%10=2,  2%10=2  ✓ fin
→ return true  (25 أوتومورف!)`,
    fr:`🔗 Pas à pas pour n=25:
carre=625, k=2
Tour 1: 625%10=5, 25%10=5 ✓ carre=62,n=2
Tour 2: 62%10=2,  2%10=2  ✓ fin
→ return true  (25 est automorphe!)`,
    en:`🔗 Step by step for n=25:
square=625, k=2
Round 1: 625%10=5, 25%10=5 ✓ sq=62,n=2
Round 2: 62%10=2,  2%10=2  ✓ done
→ return true  (25 is automorphic!)`
  },
  category:'control'
},

38:{
  title:{ar:'void AfficherNbrAutomorphe(int n,int m)',fr:'void AfficherNbrAutomorphe(int n,int m)',en:'void AfficherNbrAutomorphe(int n,int m)'},
  exp:{
    ar:`📌 void — إجراء بلا قيمة مُرجَعة:
void تعني "لا أُرجع شيئاً رقمياً".
الدالة تُنجز عملاً (الطباعة) دون إرجاع قيمة.

💡 الكود الكامل:
void AfficherNbrAutomorphe(int n, int m) {
    while(n <= m) {
        if(Automorphe(n))
            printf("%d, ", n);
        n++;
    }
}

💡 الاستدعاء من main:
int n, m;
scanf("%d %d", &n, &m);
AfficherNbrAutomorphe(n, m);
printf("\\n");

📊 أنواع الدوال:
int xxx()   → تُرجع عدداً صحيحاً
float xxx() → تُرجع عدداً عشرياً
bool xxx()  → تُرجع true/false
void xxx()  → لا تُرجع شيئاً`,
    fr:`📌 void — procédure sans valeur de retour:
void = "je ne retourne rien de numérique".
La fonction effectue une action (affichage).

💡 Code complet:
void AfficherNbrAutomorphe(int n, int m) {
    while(n <= m) {
        if(Automorphe(n))
            printf("%d, ", n);
        n++;
    }
}

📊 Types de fonctions:
int xxx()   → retourne un entier
float xxx() → retourne un flottant
bool xxx()  → retourne true/false
void xxx()  → ne retourne rien`,
    en:`📌 void — procedure with no return value:
void = "I return nothing numeric".
Function performs an action (printing).

💡 Full code:
void AfficherNbrAutomorphe(int n, int m) {
    while(n <= m) {
        if(Automorphe(n))
            printf("%d, ", n);
        n++;
    }
}

📊 Function types:
int xxx()   → returns integer
float xxx() → returns float
bool xxx()  → returns true/false
void xxx()  → returns nothing`
  },
  algFr:`Procédure AfficherNbrAutomorphe(n, m)
Début
    Tant que n ≤ m Faire
        Si Automorphe(n) alors
            Écrire(n, ", ")
        FinSi
        n ← n + 1
    FinTantQue
Fin

// "Procédure" = fonction "void" en C
// Pas de "Retourner valeur"`,
  algExp:{
    ar:`🔗 الربط:
"إجراء" في الخوارزمية → void في C
"اكتب(n)" → printf("%d, ", n)
"n←n+1"  → n++

📌 الاستدعاء من main:
AfficherNbrAutomorphe(1, 100);
// يطبع: 1, 5, 6, 25, 76,`,
    fr:`🔗 Lien:
"Procédure" en algo → void en C
"Écrire(n)" → printf("%d, ", n)
"n←n+1"    → n++

📌 Appel depuis main:
AfficherNbrAutomorphe(1, 100);
// affiche: 1, 5, 6, 25, 76,`,
    en:`🔗 Link:
"Procedure" in algorithm → void in C
"Write(n)" → printf("%d, ", n)
"n←n+1"   → n++

📌 Call from main:
AfficherNbrAutomorphe(1, 100);
// prints: 1, 5, 6, 25, 76,`
  },
  category:'control'
},

40:{
  title:{ar:'printf("%d, ", n)',fr:'printf("%d, ", n)',en:'printf("%d, ", n)'},
  exp:{
    ar:`📌 تحليل printf:
printf("تنسيق", قيم...)

"نص تنسيق" يحتوي:
• نص ثابت: يُطبَع كما هو
• %d : يُستبدَل بقيمة عدد صحيح

💡 مثال مفصَّل:
printf("%d, ", n);
// إذا n=25 → يطبع: 25, 
// النتيجة النهائية: 1, 5, 6, 25,

💡 أمثلة متقدمة:
printf("%d + %d = %d\\n", a, b, a+b);
printf("%-10s|%5d\\n", name, score);
printf("0x%X\\n", 255);  // 0xFF

⚠️ القاعدة: عدد % = عدد الوسائط بعد الفاصلة`,
    fr:`📌 Analyse de printf:
printf("format", valeurs...)

Le format contient:
• texte fixe: affiché tel quel
• %d : remplacé par la valeur entière

💡 Exemple:
printf("%d, ", n);
// Si n=25 → affiche: 25,

💡 Exemples avancés:
printf("%d + %d = %d\\n", a, b, a+b);
printf("0x%X\\n", 255);  // 0xFF`,
    en:`📌 printf analysis:
printf("format", values...)

Format string contains:
• fixed text: printed as-is
• %d : replaced by integer value

💡 Example:
printf("%d, ", n);
// If n=25 → prints: 25,

💡 Advanced examples:
printf("%d + %d = %d\\n", a, b, a+b);
printf("0x%X\\n", 255);  // 0xFF`
  },
  algFr:`Écrire(n, ", ")
// En C: printf("%d, ", n);

// Structure:
// printf( "format",  variables );
//          ^^^^^^    ^^^^^^^^^
//        "%d, "       n=25
//
// Résultat: "25, "`,
  algExp:{
    ar:`🔗 الربط:
"اكتب(n, ",")" في الخوارزمية
→ printf("%d, ", n); في C

📌 في نهاية البرنامج:
printf("\\n");  // لسطر جديد بعد القائمة
// أو printf("\\b\\b  \\n"); لإزالة الفاصلة الأخيرة`,
    fr:`🔗 Lien:
"Écrire(n, ",")" en algo
→ printf("%d, ", n); en C

📌 À la fin du programme:
printf("\\n");  // nouvelle ligne après la liste`,
    en:`🔗 Link:
"Write(n, ",")" in algorithm
→ printf("%d, ", n); in C

📌 At end of program:
printf("\\n");  // newline after the list`
  },

41:{
  title:{ar:'carre = n * n',fr:'carre = n * n',en:'carre = n * n'},
  exp:{
    ar:`📌 الاستخدام في Automorphe:
نحسب مربع n ونخزِّنه لنقارن أرقامه.

💡 الكود:
int carre = n * n;
// مثال: n=25 → carre=625

💡 لماذا نخزِّنه في متغير؟
• لا نُعيد الحساب في كل دورة
• يُعدَّل (n /=10 وcarre /=10) بشكل مستقل

💡 المشغِّلات الحسابية في C:
+  جمع         n + 3
-  طرح         n - 1
*  ضرب         n * n
/  قسمة        n / 10
%  باقي        n % 10

⚠️ إذا كان n كبيراً:
n=1000000 → n*n = 10^12 > حد int
→ استخدم long long carre = (long long)n*n`,
    fr:`📌 Usage dans Automorphe:
On calcule n² et le stocke pour comparer.

💡 Code:
int carre = n * n;
// Exemple: n=25 → carre=625

💡 Opérateurs arithmétiques:
+, -, *, /, %

⚠️ Pour n grand:
n=1000000 → n*n dépasse int
→ Utiliser long long`,
    en:`📌 Usage in Automorphe:
We calculate n² and store it to compare digits.

💡 Code:
int carre = n * n;
// Example: n=25 → carre=625

💡 Arithmetic operators:
+, -, *, /, %

⚠️ For large n:
n=1000000 → n*n overflows int
→ Use long long`
  },
  algFr:`carre ← n × n
// En C: int carre = n * n;

// Exemple pour n=25:
// carre = 25 × 25 = 625
// On va comparer:
//   625 % 10 = 5  avec  25 % 10 = 5 ✓
//   62  % 10 = 2  avec   2 % 10 = 2 ✓
// → 25 est automorphe!`,
  algExp:{
    ar:`🔗 الربط:
"carre ← n × n" في الخوارزمية
→ int carre = n * n; في C

📌 ترتيب العمليات:

    fr:`🔗 Lien:

42:{
  title:{ar:'int main()',fr:'int main()',en:'int main()'},
  exp:{
    ar:`📌 نقطة انطلاق كل برنامج C:
main() هي الدالة التي يبدأ منها التنفيذ.

💡 الأشكال المقبولة:
int main()               // لا معاملات
int main(void)           // صريح: لا معاملات
int main(int argc, char* argv[]) // مع وسائط سطر الأوامر

💡 هيكل main المثالي:
int main() {
    // 1. الإعلان عن المتغيرات
    int n, m;
    // 2. القراءة من المستخدم
    scanf("%d %d", &n, &m);
    // 3. عرض رسالة
    printf("الأعداد الأوتومورفية: ");
    // 4. استدعاء الدوال
    AfficherNbrAutomorphe(n, m);
    // 5. الإنهاء
    printf("\\n");
    return 0;
}

📌 اجعل main قصيرةً! — استدعِ دوالاً أخرى.`,
    fr:`📌 Point d'entrée de tout programme C.

💡 Structure idéale:
int main() {
    int n, m;
    scanf("%d %d", &n, &m);
    printf("Nombres automorphes: ");
    AfficherNbrAutomorphe(n, m);
    printf("\\n");
    return 0;
}

📌 Garder main courte! — déléguer aux fonctions.`,
    en:`📌 Starting point of every C program.

💡 Ideal structure:
int main() {
    int n, m;
    scanf("%d %d", &n, &m);
    printf("Automorphic numbers: ");
    AfficherNbrAutomorphe(n, m);
    printf("\\n");
    return 0;
}

📌 Keep main short! — delegate to functions.`
  },
  algFr:`Algorithme Principal
Début

    2. Afficher le titre
    3. AfficherNbrAutomorphe(n, m)
    4. Aller à la ligne
    5. Retourner 0 au système
Fin

// Chaque étape = une ou deux lignes en C

  algExp:{
    ar:`🔗 ترجمة:
"الخوارزمية الرئيسية" → int main() في C

    fr:`🔗 Traduction:

💡 Un bon commentaire explique "pourquoi" pas "quoi":
// Mauvais: i++; // incrémenter i
// Bon: i++;    // sauter l'indice 0 (réservé)

💡 Types de commentaires:
//    → une ligne (celui-ci)
/* */ → multi-lignes (suivant)`,

// Bad: i++; // increment i
// Good: i++; // skip index 0 (reserved for header)

💡 Comment types:

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let lang='ar', filter='all', currentId=1, step=1;

// ═══════════════════════════════════════════
//  RENDER GRID
// ═══════════════════════════════════════════
function renderGrid(){
    const q=(document.getElementById('search').value||'').toLowerCase();
    const c=document.getElementById('codesContainer');
    c.innerHTML='';
    let idx=0;
    Object.keys(data).forEach(k=>{
        const item=data[k];
        if(filter!=='all'&&item.category!==filter) return;
        if(q){
            const hay=(item.title[lang]+(item.exp[lang]||'')+k).toLowerCase();
            if(!hay.includes(q)) return;
        }
        idx++;
        const box=document.createElement('div');
        box.className='code-box';
        box.style.animationDelay=(idx*0.04)+'s';
        const icon=catIcons[item.category]||'fa-code';
        const clr=catColors[item.category]||'';
        box.innerHTML=`
            <div class="box-icon"><i class="fas ${icon} ${clr}"></i></div>
            <div class="code-content">${Security.sanitize(item.title[lang])}</div>
            <span class="code-category">${Security.sanitize(catLabels[item.category][lang])}</span>
        `;
        box.addEventListener('click',()=>{
            box.classList.add('pulse');
            setTimeout(()=>box.classList.remove('pulse'),500);
            // fill search
            const sb=document.getElementById('search');
            sb.value=Security.sanitize(item.title[lang]);
            sb.classList.add('highlighted');
            setTimeout(()=>sb.classList.remove('highlighted'),2000);
            openModal(parseInt(k));
        });
        c.appendChild(box);
    });
}

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
function openModal(id){
    currentId=id; step=1;
    updateModal();
    document.getElementById('modal').className='modal open';
    document.body.style.overflow='hidden';
}

function updateModal(){
    const item=data[currentId];
    const ui=UI[lang];
    document.getElementById('mTitle').textContent=item.title[lang];
    document.getElementById('mCat').textContent=catLabels[item.category][lang];

    // tabs
    ['tab1','tab2','tab3'].forEach((id,i)=>{
        const t=document.getElementById(id);
        t.textContent=ui[id];
        t.className='step-tab'+(step===i+1?' on':'');
    });

    // body class
    document.getElementById('mBody').className='modal-body step-'+step;

    // content
    const contents=[item.exp[lang], item.algFr, item.algExp[lang]];
    const lbls=[ui.lbl1,ui.lbl2,ui.lbl3];
    document.getElementById('stepLbl').textContent=lbls[step-1];
    document.getElementById('mContent').textContent=contents[step-1];

    // dots
    document.querySelectorAll('.dot').forEach(d=>{
        d.classList.toggle('on',parseInt(d.dataset.d)===step);
    });

    // buttons
    const prevBtn=document.getElementById('prevBtn');
    const nextTxt=document.getElementById('nextTxt');
    prevBtn.style.display=step>1?'inline-flex':'none';
    const closeWord=step===3?(lang==='ar'?'إغلاق':lang==='fr'?'Fermer':'Close'):ui.next;
    nextTxt.textContent=closeWord;
    document.getElementById('closeTxt').textContent=ui.close;
    document.getElementById('prevTxt').textContent=ui.prev;
}

function closeModal(){
    document.getElementById('modal').className='modal';
    document.body.style.overflow='';
}

function nextStep(){if(step<3){step++;updateModal();}else closeModal();}
function prevStep(){if(step>1){step--;updateModal();}}

// ═══════════════════════════════════════════
//  LANGUAGE
// ═══════════════════════════════════════════
function setLang(l){
    lang=l;
    document.getElementById('html-root').setAttribute('lang',l);
    document.getElementById('html-root').setAttribute('dir',l==='ar'?'rtl':'ltr');
    document.body.className='lang-'+l;
    document.querySelectorAll('#langBar .lb').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
    const ui=UI[l];
    document.getElementById('homeText').textContent=ui.home;
    document.getElementById('pageTitle').textContent=ui.title;
    document.getElementById('subtitle').textContent=ui.subtitle;
    document.getElementById('hintText').textContent=ui.hint;
    document.getElementById('search').placeholder=ui.search;
    document.getElementById('badgeText').textContent=ui.badge;
    // update filter labels
    document.querySelectorAll('.filter-btn').forEach(btn=>{
        const cat=btn.dataset.cat;
        if(catLabels[cat]) btn.textContent=catLabels[cat][l];
    });
    renderGrid();
    if(document.getElementById('modal').className.includes('open')) updateModal();
}

// ═══════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════
document.getElementById('filtersBar').addEventListener('click',e=>{
    const btn=e.target.closest('.filter-btn');
    if(!btn) return;
    filter=btn.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
});

document.getElementById('langBar').addEventListener('click',e=>{
    const btn=e.target.closest('.lb');
    if(btn&&btn.dataset.l) setLang(btn.dataset.l);
});

document.getElementById('stepTabs').addEventListener('click',e=>{
    const btn=e.target.closest('.step-tab');
    if(btn){step=parseInt(btn.dataset.s);updateModal();}
});

document.getElementById('nextBtn').addEventListener('click',nextStep);
document.getElementById('prevBtn').addEventListener('click',prevStep);
document.getElementById('closeBtn').addEventListener('click',closeModal);

document.getElementById('search').addEventListener('input',renderGrid);

document.addEventListener('keydown',e=>{
    if(e.key==='Escape') closeModal();
    const open=document.getElementById('modal').className.includes('open');
    if(open&&e.key==='ArrowLeft') nextStep();
    if(open&&e.key==='ArrowRight') prevStep();
});

document.getElementById('modal').addEventListener('click',e=>{
    if(e.target===document.getElementById('modal')) closeModal();
});

document.querySelector('.home-btn').addEventListener('click',e=>{
    if(!Security.validateLink(e.currentTarget.href)) e.preventDefault();
});

window.addEventListener('scroll',()=>document.body.classList.toggle('scrolling',scrollY>10));

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
    Security.protect();
    if(window.self!==window.top){
        try{window.top.location=window.self.location;}
        catch(e){document.body.innerHTML='<div style="padding:20px;text-align:center;color:white;"><h2>⚠️ تحذير أمني</h2><p>يرجى فتح الصفحة مباشرة في المتصفح.</p></div>';}
    }
    setLang('ar');
});
</script>
</body>
</html>
