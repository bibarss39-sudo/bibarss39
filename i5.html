<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>رموز واختصارات C و Code::Blocks</title>
    <link rel="icon" type="image/png" href="favicon.jpg">
    
    <meta property="og:site_name" content="Algorithmes & C">
    <meta name="description" content="موسوعة شاملة لرموز لغة C واختصارات Code::Blocks للمبرمجين">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" crossorigin="anonymous">

    <style>
        :root {
            --bg-primary: #080d18;
            --bg-secondary: #111827;
            --bg-gradient: linear-gradient(135deg, #080d18 0%, #111827 100%);
            
            --card-bg: rgba(17, 24, 39, 0.95);
            --card-bg-hover: rgba(24, 32, 48, 0.98);
            --card-border: rgba(34, 211, 238, 0.22);
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            
            --accent-primary: #22d3ee;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #67e8f9;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            
            --blue-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            --blue-gradient-light: linear-gradient(135deg, var(--accent-tertiary), #a5f3fc);
            
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-code: #7dd3fc;
            
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 15px 40px rgba(34, 211, 238, 0.16);
            
            --transition-fast: all 0.2s ease;
            --transition-normal: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            padding: 0;
            font-size: 16px;
        }

        .fas, .fab, .fa {
            font-family: "Font Awesome 6 Free" !important;
            font-weight: 900 !important;
        }

        .fa-home:before { content: "\f015"; }
        .fa-code:before { content: "\f121"; }
        .fa-keyboard:before { content: "\f11c"; }
        .fa-lightbulb:before { content: "\f0eb"; }
        .fa-copy:before { content: "\f0c5"; }
        .fa-times:before { content: "\f00d"; }
        .fa-check-circle:before { content: "\f058"; }

        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--blue-gradient);
            z-index: 10000;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            margin-bottom: 0;
            gap: 12px;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
            background: var(--blue-gradient);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: var(--transition-normal);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }

        .home-btn:hover,
        .home-btn:focus {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-buttons {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-normal);
        }

        .lang-btn.active {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        .main-content {
            padding: 20px 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-section {
            text-align: center;
            padding: 24px 0 32px;
            margin-bottom: 24px;
        }

        .main-title {
            font-size: 24px;
            font-weight: 800;
            background: var(--blue-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .hint-container {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.8s ease-out;
        }

        .hint-icon {
            font-size: 20px;
            color: var(--accent-tertiary);
            flex-shrink: 0;
        }

        .hint-text {
            color: var(--text-secondary);
            font-size: 15px;
            flex: 1;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 12px;
            border-right: 4px solid var(--accent-primary);
        }

        .section-icon {
            width: 48px;
            height: 48px;
            background: var(--blue-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            flex: 1;
        }

        .symbols-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .symbol-card {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            padding: 16px 8px;
            cursor: pointer;
            font-size: 22px;
            font-weight: 700;
            transition: var(--transition-normal);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1;
            color: var(--text-code);
            touch-action: manipulation;
        }

        .symbol-card:hover,
        .symbol-card:focus {
            transform: translateY(-4px) scale(1.05);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-primary);
            color: white;
        }

        .symbol-card:active {
            transform: translateY(-2px) scale(1.03);
            transition: var(--transition-fast);
        }

        /* قائمة الاختصارات */
        .shortcuts-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .shortcut-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            transition: var(--transition-normal);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .shortcut-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }

        .shortcut-key {
            background: var(--blue-gradient);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            font-family: 'Courier New', monospace;
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
            min-width: 120px;
            flex-shrink: 0;
        }

        .shortcut-desc {
            color: var(--text-secondary);
            font-size: 15px;
            flex: 1;
        }

        /* نافذة البوب أب */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 16px;
        }

        .overlay.active {
            opacity: 1;
        }

        .popup {
            background: var(--card-bg);
            border: 2px solid var(--accent-primary);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            color: white;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            transform: translateY(20px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .overlay.active .popup {
            transform: translateY(0) scale(1);
        }

        .popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--blue-gradient);
        }

        .popup-symbol {
            font-size: 48px;
            color: var(--text-code);
            margin-bottom: 16px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        .popup-desc {
            color: var(--text-secondary);
            margin: 12px 0;
            font-size: 16px;
            line-height: 1.5;
            min-height: 48px;
        }

        .popup-key {
            background: rgba(59, 130, 246, 0.15);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-code);
            margin-top: 12px;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(96, 165, 250, 0.3);
        }

        .popup-actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }

        .popup-btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-normal);
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }

        .popup-btn.copy {
            background: var(--blue-gradient);
            color: white;
        }

        .popup-btn.copy:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .popup-btn.close {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .popup-btn.close:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .copy-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--blue-gradient);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            z-index: 10001;
            opacity: 0;
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 90%;
            white-space: nowrap;
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .advanced-tips {
            background: rgba(59, 130, 246, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin: 32px 0;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .advanced-tips h3 {
            color: var(--accent-primary);
            margin-bottom: 16px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tip-list {
            display: grid;
            gap: 12px;
        }

        .tip-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            border-right: 3px solid var(--success);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer {
            text-align: center;
            padding: 24px 16px;
            margin-top: 40px;
            background: rgba(20, 25, 40, 0.8);
            border-top: 1px solid rgba(59, 130, 246, 0.2);
        }

        .footer p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes symbolClick {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 10px 12px;
            }
            
            .home-btn {
                padding: 8px 14px;
                font-size: 14px;
            }
            
            .main-title {
                font-size: 22px;
            }
            
            .subtitle {
                font-size: 15px;
                padding: 0 8px;
            }
            
            .section-header {
                padding: 10px;
            }
            
            .section-icon {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            
            .section-title {
                font-size: 18px;
            }
            
            .symbols-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 10px;
            }
            
            .symbol-card {
                padding: 14px 6px;
                font-size: 20px;
            }
            
            .shortcut-card {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
            
            .shortcut-key {
                width: 100%;
                min-width: auto;
            }
            
            .popup {
                padding: 20px;
            }
            
            .popup-actions {
                flex-direction: column;
            }
            
            .popup-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .symbols-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .symbol-card {
                font-size: 18px;
                padding: 12px 4px;
            }
            
            .main-title {
                font-size: 20px;
            }
            
            .hint-container {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
            
            .hint-icon {
                font-size: 18px;
            }
        }

        @media (min-width: 768px) {
            .main-content {
                padding: 24px 20px;
            }
            
            .hero-section {
                padding: 32px 0 40px;
            }
            
            .main-title {
                font-size: 28px;
            }
            
            .shortcuts-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .main-content {
                padding: 32px 24px;
            }
            
            .hero-section {
                padding: 40px 0 48px;
            }
            
            .main-title {
                font-size: 32px;
            }
            
            .symbols-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 16px;
            }
            
            .symbol-card {
                font-size: 24px;
                padding: 20px 10px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (hover: none) {
            .symbol-card:hover,
            .shortcut-card:hover,
            .home-btn:hover {
                transform: none;
            }
            
            .symbol-card:active,
            .shortcut-card:active,
            .home-btn:active {
                transform: scale(0.98);
                opacity: 0.9;
            }
        }
    </style>
</head>

<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <div class="top-bar">
        <a href="asasi.html" class="home-btn">
            <i class="fas fa-home"></i>
            <span class="lang-key" data-key="home">الرئيسية</span>
                <link rel="icon" type="image/png" href="favicon.jpg">

        </a>

        <div class="nav-controls">
            <div class="lang-buttons">
                <button class="lang-btn active" data-lang="ar" onclick="setLang('ar')" aria-label="اللغة العربية">
                    <span>🇸🇦</span>
                </button>
                <button class="lang-btn" data-lang="fr" onclick="setLang('fr')" aria-label="اللغة الفرنسية">
                    <span>🇫🇷</span>
                </button>
                <button class="lang-btn" data-lang="en" onclick="setLang('en')" aria-label="اللغة الإنجليزية">
                    <span>🇬🇧</span>
                </button>
            </div>
        </div>
    </div>

    <main class="main-content">
        <section class="hero-section">
            <h1 class="main-title lang-key" data-key="page-title">رموز واختصارات C و Code::Blocks</h1>
            <p class="subtitle lang-key" data-key="subtitle">كل ما تحتاجه للبرمجة بلغة C في مكان واحد</p>
        </section>

        <div class="hint-container">
            <div class="hint-icon">💡</div>
            <div class="hint-text" id="hintText">انقر على أي رمز لعرض شرحه - يمكنك نسخ الرموز بسهولة!</div>
        </div>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">
                    <i class="fas fa-code"></i>
                </div>
                <h2 class="section-title lang-key" data-key="symbols">الرموز الأساسية في لغة C</h2>
            </div>
            <div class="symbols-grid" id="symbolsGrid">
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">
                    <i class="fas fa-keyboard"></i>
                </div>
                <h2 class="section-title lang-key" data-key="shortcuts">اختصارات Code::Blocks</h2>
            </div>
            <div class="shortcuts-list" id="shortcutsList">
            </div>
        </section>

        <section class="section">
            <div class="advanced-tips">
                <h3><i class="fas fa-lightbulb"></i> <span class="lang-key" data-key="advanced-tips">نصائح للمبرمجين</span></h3>
                <div class="tip-list" id="advancedTips">
                </div>
            </div>
        </section>
    </main>

    <div class="overlay" id="overlay" onclick="event.target === this && closePopup()">
        <div class="popup">
            <div class="popup-symbol" id="pSymbol"></div>
            <div class="popup-desc" id="pDesc"></div>
            <div class="popup-key" id="pKey"></div>
            <div class="popup-actions">
                <button class="popup-btn copy" id="copyBtn">
                    <i class="fas fa-copy"></i>
                    <span id="copyBtnText">نسخ الرمز</span>
                </button>
                <button class="popup-btn close" id="closeBtn">
                    <i class="fas fa-times"></i>
                    <span id="closeBtnText">إغلاق</span>
                </button>
            </div>
        </div>
    </div>

    <div class="copy-notification" id="copyNotification" role="alert" aria-live="assertive">
        <i class="fas fa-check-circle"></i>
        <span id="notificationText">تم نسخ الرمز بنجاح!</span>
    </div>

    <footer class="footer">
        <p>© 2024 رموز واختصارات C و Code::Blocks</p>
        <p class="lang-key" data-key="footer">جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const escapeHTML = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const symbols = [
            { char: "+", key: "مفتاح +", desc: { ar: "عملية الجمع أو الموجب الأحادي", en: "Addition or unary plus", fr: "Addition ou plus unaire" } },
            { char: "-", key: "مفتاح -", desc: { ar: "عملية الطرح أو السالب الأحادي", en: "Subtraction or unary minus", fr: "Soustraction ou moins unaire" } },
            { char: "*", key: "Shift + 8", desc: { ar: "عملية الضرب أو تفريغ المؤشر", en: "Multiplication or pointer dereference", fr: "Multiplication ou déréférencement" } },
            { char: "/", key: "مفتاح /", desc: { ar: "عملية القسمة أو التعليق السطري", en: "Division or single-line comment", fr: "Division ou commentaire ligne" } },
            { char: "%", key: "Shift + 5", desc: { ar: "عملية باقي القسمة", en: "Modulo operator", fr: "Opérateur modulo" } },
            { char: "++", key: "+ +", desc: { ar: "زيادة بمقدار واحد", en: "Increment by one", fr: "Incrémentation" } },
            { char: "--", key: "- -", desc: { ar: "نقصان بمقدار واحد", en: "Decrement by one", fr: "Décrémentation" } },
            { char: "=", key: "مفتاح =", desc: { ar: "عامل الإسناد", en: "Assignment operator", fr: "Opérateur d'affectation" } },
            
            { char: "+=", key: "+ =", desc: { ar: "جمع وإسناد", en: "Add and assign", fr: "Addition et affectation" } },
            { char: "-=", key: "- =", desc: { ar: "طرح وإسناد", en: "Subtract and assign", fr: "Soustraction et affectation" } },

            { char: "/=", key: "/ =", desc: { ar: "قسمة وإسناد", en: "Divide and assign", fr: "Division et affectation" } },
            
            { char: "==", key: "Shift + =", desc: { ar: "المساواة", en: "Equality comparison", fr: "Égalité" } },
            { char: "!=", key: "Alt Gr + Shift + =", desc: { ar: "عدم المساواة", en: "Inequality", fr: "Différence" } },
            { char: "<", key: "Shift + ,", desc: { ar: "أصغر من", en: "Less than", fr: "Inférieur à" } },
            { char: ">", key: "Shift + .", desc: { ar: "أكبر من", en: "Greater than", fr: "Supérieur à" } },
            { char: "<=", key: "Shift + , =", desc: { ar: "أصغر أو يساوي", en: "Less than or equal", fr: "Inférieur ou égal" } },
            { char: ">=", key: "Shift + . =", desc: { ar: "أكبر أو يساوي", en: "Greater than or equal", fr: "Supérieur ou égal" } },

            { char: "!", key: "Shift + 1", desc: { ar: "NOT المنطقي", en: "Logical NOT", fr: "NON logique" } },
            
            { char: "{", key: "Shift + [", desc: { ar: "بداية كتلة تعليمات", en: "Start of block", fr: "Début de bloc" } },
            { char: "}", key: "Shift + ]", desc: { ar: "نهاية كتلة تعليمات", en: "End of block", fr: "Fin de bloc" } },

            { char: ")", key: "Shift + 0", desc: { ar: "قوس إغلاق", en: "Closing parenthesis", fr: "Parenthèse fermante" } },
            { char: "[", key: "Alt Gr + 5", desc: { ar: "قوس فتح للمصفوفات", en: "Opening bracket", fr: "Crochet ouvrant" } },
            { char: "]", key: "Alt Gr + °", desc: { ar: "قوس إغلاق للمصفوفات", en: "Closing bracket", fr: "Crochet fermant" } },
            { char: ";", key: "مفتاح ;", desc: { ar: "نهاية العبارة", en: "Statement terminator", fr: "Fin d'instruction" } },
            { char: ":", key: "Shift + .", desc: { ar: "النقطتان للتبديل والتسميات", en: "Colon for switch/labels", fr: "Deux-points" } },
            { char: ",", key: "مفتاح ,", desc: { ar: "فاصلة لفصل العناصر", en: "Comma separator", fr: "Virgule séparatrice" } },
            { char: ".", key: "مفتاح .", desc: { ar: "نقطة للوصول إلى الأعضاء", en: "Member access", fr: "Accès membre" } },
            { char: "->", key: "- >", desc: { ar: "وصول لعناصر المؤشر", en: "Pointer member access", fr: "Accès membre pointeur" } },
            { char: "#", key: "Alt Gr + 3", desc: { ar: "توجيهات الماكرو", en: "Preprocessor directive", fr: "Directive préprocesseur" } },
            
            { char: "&", key: "Shift + 7", desc: { ar: "AND ثنائي البت", en: "Bitwise AND", fr: "ET bit à bit" } },
            { char: "|", key: "Alt Gr + 6", desc: { ar: "OR ثنائي البت", en: "Bitwise OR", fr: "OU bit à bit" } },
            { char: "^", key: "Alt Gr + 9", desc: { ar: "XOR ثنائي البت", en: "Bitwise XOR", fr: "XOR bit à bit" } },
            { char: "~", key: "Alt Gr + 2", desc: { ar: "NOT ثنائي البت", en: "Bitwise NOT", fr: "NON bit à bit" } },
            { char: "<<", key: "Shift + , Shift + ,", desc: { ar: "تحويل لليسار", en: "Left shift", fr: "Décalage à gauche" } },
            { char: ">>", key: "Shift + . Shift + .", desc: { ar: "تحويل لليمين", en: "Right shift", fr: "Décalage à droite" } }
        ];

        const shortcuts = [
            { keys: "F9", desc: { ar: "ترجمة وتشغيل البرنامج", en: "Build and run program", fr: "Compiler et exécuter" } },
            { keys: "Ctrl + F9", desc: { ar: "ترجمة فقط بدون تشغيل", en: "Build without running", fr: "Compiler sans exécuter" } },
            { keys: "F8", desc: { ar: "الخطوة التالية في التصحيح", en: "Step over in debugger", fr: "Pas à pas par dessus" } },
            { keys: "Ctrl + F8", desc: { ar: "إضافة/إزالة نقطة توقف", en: "Toggle breakpoint", fr: "Basculer point d'arrêt" } },
            { keys: "Ctrl + Shift + N", desc: { ar: "إنشاء ملف C/C++ جديد", en: "Create new C/C++ file", fr: "Créer nouveau fichier" } },
            { keys: "Ctrl + O", desc: { ar: "فتح ملف موجود", en: "Open existing file", fr: "Ouvrir fichier" } },
            { keys: "Ctrl + S", desc: { ar: "حفظ الملف الحالي", en: "Save current file", fr: "Enregistrer fichier" } },
            { keys: "Ctrl + /", desc: { ar: "تعليق/إلغاء تعليق السطر", en: "Comment/uncomment line", fr: "Commenter/décommenter" } },
            { keys: "Ctrl + Z", desc: { ar: "تراجع عن التعديل", en: "Undo", fr: "Annuler" } },
            { keys: "Ctrl + Y", desc: { ar: "إعادة التعديل", en: "Redo", fr: "Rétablir" } },
            { keys: "Ctrl + F", desc: { ar: "بحث عن نص", en: "Find text", fr: "Rechercher texte" } },
            { keys: "Ctrl + H", desc: { ar: "استبدال نص", en: "Replace text", fr: "Remplacer texte" } },
            { keys: "Ctrl + D", desc: { ar: "نسخ السطر الحالي", en: "Duplicate line", fr: "Dupliquer ligne" } },
            { keys: "Ctrl + L", desc: { ar: "حذف السطر الحالي", en: "Delete line", fr: "Supprimer ligne" } },
            { keys: "Alt + F8", desc: { ar: "إعادة تنسيق الكود", en: "Reformat code", fr: "Reformater code" } }
        ];

        const advancedTips = [
            { text: { ar: "استخدم التعليقات لشرح الكود المعقد", en: "Use comments to explain complex code", fr: "Utilisez des commentaires pour expliquer le code complexe" } },
            { text: { ar: "اختر أسماء متغيرات توضح الغرض منها", en: "Choose variable names that indicate purpose", fr: "Choisissez des noms de variables clairs" } },
            { text: { ar: "قسم الكود الطويل إلى دوال صغيرة", en: "Break long code into small functions", fr: "Divisez le code long en petites fonctions" } },
            { text: { ar: "اختبر كل دالة على حدة قبل التكامل", en: "Test each function separately before integration", fr: "Testez chaque fonction séparément" } }
        ];

        const hints = [
            { ar: "انقر على أي رمز لعرض شرحه - يمكنك نسخ الرموز بسهولة!", en: "Click any symbol to see details - you can easily copy symbols!", fr: "Cliquez sur un symbole pour voir les détails - vous pouvez copier facilement!" },
            { ar: "استخدم F9 لتشغيل البرنامج بسرعة في Code::Blocks", en: "Use F9 to quickly run your program in Code::Blocks", fr: "Utilisez F9 pour exécuter rapidement votre programme dans Code::Blocks" },
            { ar: "استخدم Ctrl+/ لتعليق أو إلغاء تعليق الأسطر", en: "Use Ctrl+/ to comment or uncomment lines", fr: "Utilisez Ctrl+/ pour commenter ou décommenter des lignes" }
        ];

        const translations = {
            "page-title": {
                ar: "رموز واختصارات C و Code::Blocks",
                en: "C & Code::Blocks Symbols & Shortcuts",
                fr: "Symboles et Raccourcis C & Code::Blocks"
            },
            "subtitle": {
                ar: "كل ما تحتاجه للبرمجة بلغة C في مكان واحد",
                en: "Everything you need for C programming in one place",
                fr: "Tout ce dont vous avez besoin pour programmer en C au même endroit"
            },
            "symbols": {
                ar: "الرموز الأساسية في لغة C",
                en: "Essential C Language Symbols",
                fr: "Symboles Essentiels du Langage C"
            },
            "shortcuts": {
                ar: "اختصارات Code::Blocks",
                en: "Code::Blocks Shortcuts",
                fr: "Raccourcis Code::Blocks"
            },
            "advanced-tips": {
                ar: "نصائح للمبرمجين",
                en: "Tips for Programmers",
                fr: "Conseils pour Programmeurs"
            },
            "home": {
                ar: "الرئيسية",
                en: "Home",
                fr: "Accueil"
            },
            "close": {
                ar: "إغلاق",
                en: "Close",
                fr: "Fermer"
            },
            "copy": {
                ar: "نسخ الرمز",
                en: "Copy Symbol",
                fr: "Copier Symbole"
            },
            "copied": {
                ar: "تم نسخ الرمز بنجاح!",
                en: "Symbol copied successfully!",
                fr: "Symbole copié avec succès!"
            },
            "footer": {
                ar: "جميع الحقوق محفوظة",
                en: "All rights reserved",
                fr: "Tous droits réservés"
            }
        };

        let currentLang = "ar";
        let currentSymbol = null;
        let currentSymbolChar = "";
        let isPopupOpen = false;

        function updateScrollProgress() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scrollProgress").style.width = scrolled + "%";
        }

        function showPopup(symbol, char) {
            if (isPopupOpen) return;
            isPopupOpen = true;
            
            currentSymbol = symbol;
            currentSymbolChar = char;
            
            document.getElementById("pSymbol").textContent = char;
            document.getElementById("pDesc").textContent = symbol.desc[currentLang];
            document.getElementById("pKey").textContent = symbol.key;
            
            const overlay = document.getElementById("overlay");
            overlay.style.display = "flex";
            setTimeout(() => overlay.classList.add('active'), 10);
            
            setTimeout(() => document.getElementById("closeBtn").focus(), 100);
        }

        function closePopup() {
            isPopupOpen = false;
            const overlay = document.getElementById("overlay");
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = "none";
            }, 300);
        }

        async function copySymbol() {
            if (!currentSymbolChar) return;
            
            try {
                await navigator.clipboard.writeText(currentSymbolChar);
                showNotification(translations.copied[currentLang]);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = currentSymbolChar;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);
                
                if (success) {
                    showNotification(translations.copied[currentLang]);
                }
            }
        }

        function showNotification(message) {
            const notification = document.getElementById("copyNotification");
            document.getElementById("notificationText").textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        function renderSymbols() {
            const container = document.getElementById("symbolsGrid");
            if (!container) return;
            
            container.innerHTML = '';
            symbols.forEach(symbol => {
                const card = document.createElement("button");
                card.className = "symbol-card";
                card.textContent = symbol.char;
                card.title = symbol.desc[currentLang];
                card.setAttribute('aria-label', `${symbol.char}: ${symbol.desc[currentLang]}`);
                card.setAttribute('tabindex', '0');
                
                card.addEventListener("click", (e) => {
                    e.preventDefault();
                    card.style.animation = 'symbolClick 0.3s ease';
                    setTimeout(() => card.style.animation = '', 300);
                    showPopup(symbol, symbol.char);
                });
                
                card.addEventListener("keydown", (e) => {
                    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
                        e.preventDefault();
                        showPopup(symbol, symbol.char);
                    }
                });
                
                container.appendChild(card);
            });
        }

        function renderShortcuts() {
            const container = document.getElementById("shortcutsList");
            if (!container) return;
            
            container.innerHTML = '';
            shortcuts.forEach(shortcut => {
                const card = document.createElement("div");
                card.className = "shortcut-card";
                card.innerHTML = `
                    <div class="shortcut-key">${escapeHTML(shortcut.keys)}</div>
                    <div class="shortcut-desc">${escapeHTML(shortcut.desc[currentLang])}</div>
                `;
                container.appendChild(card);
            });
        }

        function renderAdvancedTips() {
            const container = document.getElementById("advancedTips");
            if (!container) return;
            
            container.innerHTML = '';
            advancedTips.forEach(tip => {
                const item = document.createElement("div");
                item.className = "tip-item";
                item.textContent = tip.text[currentLang];
                container.appendChild(item);
            });
        }

        function updateHint() {
            const hintText = document.getElementById("hintText");
            const randomHint = hints[Math.floor(Math.random() * hints.length)];
            hintText.textContent = randomHint[currentLang];
        }

        function setLang(lang) {
            currentLang = lang;
            document.body.className = `lang-${lang}`;
            document.getElementById("html-root").setAttribute("lang", lang);
            document.getElementById("html-root").setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

            document.querySelectorAll(".lang-btn").forEach(btn => {
                btn.classList.toggle("active", btn.getAttribute("data-lang") === lang);
                btn.setAttribute('aria-pressed', btn.getAttribute("data-lang") === lang);
            });

            document.querySelectorAll("[data-key]").forEach(el => {
                const key = el.getAttribute("data-key");
                if (translations[key] && translations[key][lang] !== undefined) {
                    el.textContent = translations[key][lang];
                }
            });

            document.getElementById("copyBtnText").textContent = translations.copy[currentLang];
            document.getElementById("closeBtnText").textContent = translations.close[currentLang];

            renderSymbols();
            renderShortcuts();
            renderAdvancedTips();
            updateHint();
        }

        document.addEventListener("DOMContentLoaded", () => {
            setLang("ar");
            
            window.addEventListener("scroll", updateScrollProgress);
            
            document.getElementById("copyBtn").addEventListener("click", copySymbol);
            document.getElementById("closeBtn").addEventListener("click", closePopup);
            
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && isPopupOpen) {
                    closePopup();
                }
            });

            setInterval(updateHint, 10000);

            if ('ontouchstart' in window) {
                document.body.classList.add('touch-device');
            }
        });

        Object.freeze(symbols);
        Object.freeze(shortcuts);
        Object.freeze(advancedTips);
        Object.freeze(hints);
        Object.freeze(translations);
    </script>
</body>
</html>
