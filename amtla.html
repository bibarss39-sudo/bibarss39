<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta property="og:site_name" content="Algorithmes & C">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Algorithmes & C",
      "alternateName": "تعلم لغة C والخوارزميات",
      "url": "https://bibarss39-sudo.github.io/bibarss39/"
    }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أمثلة أكواد C مع الخوارزميات - المعمل التعليمي</title>
    <link rel="icon" type="image/png" href="favicon.jpg">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* نظام ألوان الأمثلة المتطور */
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-bg-hover: rgba(30, 41, 59, 0.7);
            --accent: #10b981;
            --accent-light: #34d399;
            --accent-dark: #059669;
            --primary-purple: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --code-text: #e2e8f0;
            --border: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--accent), #a78bfa, var(--accent-light));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1000;
            pointer-events: none;
        }

        body.scrolling::before {
            opacity: 1;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 17px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            will-change: transform;
        }

        .home-btn:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: var(--shadow-lg);
        }

        .page-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--accent-light);
            background: rgba(34, 211, 238, 0.1);
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 15px;
            transition: var(--transition);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .page-link:hover {
            background: rgba(34, 211, 238, 0.2);
            transform: translateY(-2px);
        }

        .lang-switcher {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            width: 40px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .lang-btn:hover {
            transform: scale(1.12);
            background: rgba(96, 165, 250, 0.2);
            border-color: var(--accent-light);
        }

        .lang-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.4), var(--shadow-lg);
        }

        .header-container {
            text-align: center;
            margin-bottom: 35px;
            max-width: 800px;
            margin-right: auto;
            margin-left: auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--accent-light);
            text-shadow: 0 2px 8px rgba(34, 211, 238, 0.2);
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            right: 50%;
            transform: translateX(50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.15rem;
            line-height: 1.7;
            margin-top: 25px;
        }

        .search-container {
            max-width: 650px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: var(--transition);
            font-family: 'Tajawal', sans-serif;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-light);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.3);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-light);
            font-size: 18px;
        }

        .category-filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Tajawal', sans-serif;
            font-weight: 500;
            font-size: 14px;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(34, 211, 238, 0.3);
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 28px;
            margin-top: 20px;
        }

        .example-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        .example-card:hover {
            background: var(--card-bg-hover);
            transform: translateY(-8px) scale(1.01);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(96, 165, 250, 0.3);
            border-color: rgba(96, 165, 250, 0.4);
        }

        .example-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--accent), #8b5cf6);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.4s ease;
        }

        .example-card:hover::before {
            transform: scaleY(1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 15px;
        }

        .code-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 19px;
            font-weight: 600;
            color: #ffab70;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .category-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(34, 211, 238, 0.15);
            color: var(--accent-light);
            border: 1px solid rgba(34, 211, 238, 0.3);
        }

        .copy-btn {
            background: rgba(34, 211, 238, 0.15);
            color: var(--accent-light);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .copy-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.15);
        }

        .copy-btn.copied {
            background: var(--success) !important;
            color: white !important;
            transform: scale(1.15) !important;
        }

        .code-block {
            background: rgba(10, 15, 30, 0.6);
            padding: 20px;
            border-radius: 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 15px;
            white-space: pre;
            overflow-x: auto;
            margin: 16px 0;
            color: var(--code-text);
            line-height: 1.5;
            border-right: 3px solid var(--accent);
            position: relative;
            text-align: left;
            direction: ltr;
        }

        .code-block::before {
            content: attr(data-lang);
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 12px;
            color: var(--accent-light);
            opacity: 0.7;
            font-family: 'Tajawal', sans-serif;
        }

        .lang-label {
            font-size: 15px;
            color: var(--accent-light);
            margin-top: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-label i {
            font-size: 18px;
        }

        .desc {
            color: var(--text-secondary);
            margin-top: 18px;
            font-size: 15.5px;
            line-height: 1.7;
            padding-top: 15px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            text-align: right;
        }

        .card-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Tajawal', sans-serif;
        }

        .info-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-light);
            border-color: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 30px;
            color: var(--text-secondary);
            font-size: 14px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item i {
            color: var(--accent-light);
        }

        .info-modal {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .info-modal.active {
            display: flex;
        }

        .info-modal-content {
            background: linear-gradient(135deg, var(--card-bg), rgba(30, 40, 65, 0.95));
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg), var(--glow);
            border: 1px solid rgba(96, 165, 250, 0.3);
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .info-modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--accent), #8b5cf6, #ec4899);
            border-radius: 24px 24px 0 0;
        }

        .info-header {
            padding: 25px 30px 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-header h3 {
            color: var(--accent-light);
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-header h3 i {
            color: #8b5cf6;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 18px;
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-color: #ef4444;
            transform: rotate(90deg);
        }

        .info-body {
            padding: 25px 30px;
        }

        .info-section {
            margin-bottom: 25px;
        }

        .info-title {
            color: var(--accent-light);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-title i {
            color: #8b5cf6;
        }

        .info-text {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 15px;
            padding-right: 24px;
        }

        .info-list {
            list-style: none;
            margin-top: 10px;
        }

        .info-list li {
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-right: 24px;
            position: relative;
            line-height: 1.6;
        }

        .info-list li::before {
            content: '›';
            position: absolute;
            right: 0;
            color: var(--accent);
            font-weight: bold;
            font-size: 18px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 10px;
            padding: 15px;
        }

        .info-item-label {
            color: var(--accent-light);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item-value {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }

        .info-footer {
            padding: 20px 30px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .action-btn {
            background: rgba(34, 211, 238, 0.15);
            border: 1px solid rgba(34, 211, 238, 0.3);
            color: var(--accent-light);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 500;
        }

        .action-btn:hover {
            background: rgba(34, 211, 238, 0.25);
            transform: translateY(-2px);
        }

        .action-btn.primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .action-btn.primary:hover {
            background: var(--accent-light);
            box-shadow: var(--shadow-sm);
        }

        @media (max-width: 768px) {
            .examples-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.0rem; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .nav-buttons { width: 100%; justify-content: center; }
            .home-btn, .page-link { width: 100%; justify-content: center; }
            .search-box { max-width: 100%; padding-right: 45px; }
            .example-card { padding: 24px 20px; }
            .code-block { font-size: 14.5px; padding: 16px; }
            .code-tag { font-size: 17px; }
            .info-modal-content { max-width: 95%; }
            .info-header, .info-body, .info-footer { padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .example-card { padding: 20px 16px; }
            .card-header { flex-direction: column; gap: 10px; }
            .card-meta { justify-content: flex-start; }
            .copy-btn { width: 38px; height: 38px; }
            .search-box { padding: 14px 40px 14px 20px; }
            .search-icon { right: 15px; }
            .category-filters { gap: 8px; }
            .filter-btn { padding: 8px 16px; font-size: 13px; }
            .stats { gap: 10px; }
            .stat-item { padding: 8px 16px; font-size: 13px; }
            .info-header h3 { font-size: 1.3rem; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .example-card {
            animation: fadeInUp 0.5s ease-out;
        }

        body.lang-en {
            direction: ltr;
        }

        body.lang-en .search-box {
            padding: 16px 20px 16px 50px;
        }

        body.lang-en .search-icon {
            right: auto;
            left: 20px;
        }

        body.lang-en .code-block {
            border-right: none;
            border-left: 3px solid var(--accent);
        }

        body.lang-en .code-block::before {
            right: 10px;
            left: auto;
        }

        body.lang-en .desc {
            text-align: left;
        }

        body.lang-en .info-modal-content::before {
            right: auto;
            left: 0;
        }

        body.lang-en .info-text,
        body.lang-en .info-list li {
            padding-right: 0;
            padding-left: 24px;
        }

        body.lang-en .info-list li::before {
            right: auto;
            left: 0;
        }

        body.lang-en .header-container,
        body.lang-en .category-filters,
        body.lang-en .stats {
            text-align: center;
        }

        body.lang-en .page-link,
        body.lang-en .home-btn,
        body.lang-en .info-btn,
        body.lang-en .action-btn {
            flex-direction: row-reverse;
        }

        body.lang-en .lang-label {
            flex-direction: row-reverse;
        }
    </style>
</head>

        function sanitizeHTML(dirty) {
            if (typeof DOMPurify !== 'undefined') {
                return DOMPurify.sanitize(dirty, {
                    ALLOWED_TAGS: [], 
                    ALLOWED_ATTR: []
                });
            }
            const div = document.createElement('div');
            div.textContent = dirty;
            return div.innerHTML;
        }


        function escapeHTML(str) {
            if (typeof str !== 'string') return '';
            return str.replace(/[&<>"']/g, function(m) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[m];
            });
        }


        function isValidOrigin(url) {
            try {
                const urlObj = new URL(url, window.location.href);
                return SECURITY_CONFIG.ALLOWED_ORIGINS.some(allowed => urlObj.origin === allowed);
            } catch (e) {
                return false; 
            }
        }

                'Referrer-Policy': 'strict-origin-when-cross-origin',

            };
            for (const [header, value] of Object.entries(headers)) {
                console.info(`  ${header}: ${value}`);
            }
        }


        function setSecureCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
        
            document.cookie = `${name}=${value}; expires=${expires}; path=/; SameSite=Strict`; 
            console.warn(`[Security Note] For maximum security, cookie '${name}' should be set server-side with HttpOnly and Secure flags.`);
        }

                    </div>
                `;

                container.appendChild(card);
            });

            updateStats(visibleCount);
        }

        function copyCode(btn, code) {
            const isCodeTrusted = examples.some(ex => ex.c === code);
            if (!isCodeTrusted) {
                console.error('[Security] Attempted to copy untrusted code.');
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-ban"></i>';
                btn.style.background = 'var(--warning)';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fas fa-copy"></i>';
                    btn.style.background = '';
                }, 1500);
                return;
            }

            navigator.clipboard.writeText(code).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-check"></i>';

                copiedCount++;
                localStorage.setItem('copiedCount', copiedCount);
                updateStats();

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fas fa-copy"></i>';
                }, 1500);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        function showExampleInfo(index) {
            if (index < 0 || index >= examples.length) {
                console.error('[Security] Invalid example index requested.');
                return;
            }

            currentExampleIndex = index;
            const ex = examples[index];

            document.querySelectorAll('[id^="info"]').forEach(el => {
                const id = el.id.replace('info', '').replace('Title', '');
                if (translations[`info${id}Title`]) {
                    el.textContent = translations[`info${id}Title`][currentLang];
                }
            });

            document.getElementById('infoCode').textContent = escapeHTML(ex.code);
            document.getElementById('infoDescription').textContent = escapeHTML(ex.desc[currentLang]);

            const categoryLabels = {
                'io': currentLang === 'ar' ? 'الإدخال/الإخراج' :
                      currentLang === 'fr' ? 'Entrée/Sortie' : 'Input/Output',
                'loops': currentLang === 'ar' ? 'الحلقات' :
                         currentLang === 'fr' ? 'Boucles' : 'Loops',
                'conditions': currentLang === 'ar' ? 'الشروط' :
                              currentLang === 'fr' ? 'Conditions' : 'Conditions',
                'types': currentLang === 'ar' ? 'أنواع البيانات' :
                         currentLang === 'fr' ? 'Types de données' : 'Data Types',
                'operators': currentLang === 'ar' ? 'المشغلات' :
                             currentLang === 'fr' ? 'Opérateurs' : 'Operators',
                'control': currentLang === 'ar' ? 'التحكم' :
                           currentLang === 'fr' ? 'Contrôle' : 'Control',
                'misc': currentLang === 'ar' ? 'متنوع' :
                        currentLang === 'fr' ? 'Divers' : 'Misc'
            };

            document.getElementById('infoCategory').textContent = categoryLabels[ex.category];

            const tipsList = document.getElementById('infoTips');
            tipsList.innerHTML = '';
            if (ex.tips && ex.tips[currentLang]) {
                ex.tips[currentLang].forEach(tip => {
                    const li = document.createElement('li');
                    li.textContent = escapeHTML(tip);
                    tipsList.appendChild(li);
                });
            }

            const infoGrid = document.getElementById('infoGrid');
            infoGrid.innerHTML = '';

            const gridItems = [
                {
                    icon: 'fas fa-file-code',
                    label: currentLang === 'ar' ? 'نوع الكود' :
                          currentLang === 'fr' ? 'Type de code' : 'Code Type',
                    value: currentLang === 'ar' ? 'بيان/مشغل' :
                          currentLang === 'fr' ? 'Instruction/Opérateur' : 'Statement/Operator'
                },
                {
                    icon: 'fas fa-cogs',
                    label: currentLang === 'ar' ? 'التعقيد' :
                          currentLang === 'fr' ? 'Complexité' : 'Complexity',
                    value: currentLang === 'ar' ? 'بسيط' :
                          currentLang === 'fr' ? 'Simple' : 'Simple'
                },
                {
                    icon: 'fas fa-book',
                    label: currentLang === 'ar' ? 'المكتبة' :
                          currentLang === 'fr' ? 'Bibliothèque' : 'Library',
                    value: ex.c.includes('stdio.h') ? 'stdio.h' : (currentLang === 'ar' ? 'مختلف' : 'Various')
                },
                {
                    icon: 'fas fa-history',
                    label: currentLang === 'ar' ? 'تاريخ الإضافة' :
                          currentLang === 'fr' ? 'Date d\'ajout' : 'Added Date',
                    value: currentLang === 'ar' ? 'قريباً' :
                          currentLang === 'fr' ? 'Bientôt' : 'Soon'
                }
            ];

            gridItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'info-item';
                const safeLabel = escapeHTML(item.label);
                const safeValue = escapeHTML(item.value);
                div.innerHTML = `
                    <div class="info-item-label">
                        <i class="${item.icon}"></i>
                        ${safeLabel}
                    </div>
                    <div class="info-item-value">${safeValue}</div>
                `;
                infoGrid.appendChild(div);
            });

            document.getElementById('copyExampleBtn').textContent = translations.copyExampleBtn[currentLang];
            document.getElementById('closeModalBtn').textContent = translations.closeModalBtn[currentLang];

            document.getElementById('infoModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeInfoModal() {
            document.getElementById('infoModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function copyCurrentExample() {
            if (currentExampleIndex !== -1) {
                const ex = examples[currentExampleIndex];
                navigator.clipboard.writeText(ex.c).then(() => {
                    const btn = document.querySelector('.action-btn');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> <span id="copyExampleBtn">' +
                                   (currentLang === 'ar' ? 'تم النسخ!' :
                                    currentLang === 'fr' ? 'Copié!' : 'Copied!') + '</span>';
                    btn.style.background = 'var(--success)';
                    btn.style.borderColor = 'var(--success)';
                    btn.style.color = 'white';

                    setTimeout(() => {
                        btn.innerHTML = originalHTML;
                        btn.style.background = '';
                        btn.style.borderColor = '';
                        btn.style.color = '';
                    }, 1500);
                });
            }
        }

        function filterExamples(filter) {
            currentFilter = filter;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });

            renderExamples();
        }

        function updateStats(visibleCount = 0) {
            const total = examples.length;

            const statTexts = {
                ar: {
                    total: `${total} مثال`,
                    visible: `${visibleCount} ظاهر`,
                    copied: `${copiedCount} منسوخ`
                },
                fr: {
                    total: `${total} exemples`,
                    visible: `${visibleCount} visibles`,
                    copied: `${copiedCount} copiés`
                },
                en: {
                    total: `${total} examples`,
                    visible: `${visibleCount} visible`,
                    copied: `${copiedCount} copied`
                }
            };

            document.getElementById('totalExamples').textContent = statTexts[currentLang].total;
            document.getElementById('visibleExamples').textContent = statTexts[currentLang].visible;
            document.getElementById('copiedCount').textContent = statTexts[currentLang].copied;
        }

        function setLang(lang) {
            currentLang = lang;
            document.body.className = `lang-${lang}`;
            document.getElementById("html-root").setAttribute("lang", lang);
            document.getElementById("html-root").setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

            document.querySelectorAll(".lang-btn").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.lang === lang);
            });

            document.querySelectorAll("[data-key]").forEach(el => {
                const k = el.dataset.key;
                if (translations[k] && translations[k][lang]) {
                    el.textContent = translations[k][lang];
                }
            });

            const searchPlaceholders = {
                ar: "ابحث في الأكواد أو الخوارزميات أو الوصف...",
                fr: "Rechercher dans les codes, algorithmes ou descriptions…",
                en: "Search in codes, algorithms or descriptions…"
            };

            document.getElementById("search").placeholder = searchPlaceholders[lang];

            copiedCount = parseInt(localStorage.getItem('copiedCount')) || 0;

            renderExamples();
        }

        const searchBox = document.getElementById("search");
        if (searchBox) {
           
            searchBox.addEventListener('input', function(e) {
    
                renderExamples();
            });

            searchBox.addEventListener('paste', function(e) {
                setTimeout(() => renderExamples(), 10);
            });
        }

        window.addEventListener('scroll', () => {
            document.body.classList.toggle('scrolling', window.scrollY > 10);
        });

        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", () => setLang(btn.dataset.lang));
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('infoModal').classList.contains('active')) {
                closeInfoModal();
            }
        });

        document.getElementById('infoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('infoModal')) {
                closeInfoModal();
            }
        });

        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSecurity);
        } else {
            initSecurity();
        }

        copiedCount = parseInt(localStorage.getItem('copiedCount')) || 0;
        setLang("ar");
    </script>
</body>
</html
