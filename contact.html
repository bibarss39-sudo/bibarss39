<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل معنا — تعلم لغة C | Algorithmes & C</title>
    <link rel="icon" type="image/png" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #10b981;
            --bg-dark: #030712;
            --card-bg: rgba(30, 41, 59, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            font-family: 'Tajawal', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s var(--ease-out);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 24px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; }
        .subtitle { color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6; }

        .contact-methods { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s var(--ease-out);
            text-align: right;
        }

        .contact-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .method-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .contact-card.facebook .method-icon { background: rgba(10, 185, 129, 0.1); color: var(--secondary); }

        .method-info h3 { font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; }
        .method-info p { font-size: 1.1rem; font-weight: 700; }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            transition: all 0.3s var(--ease-out);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            background: var(--primary-light);
        }

        [dir="ltr"] .contact-card { text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-circle">
            <i class="fas fa-paper-plane"></i>
        </div>
        <h1 id="title">تواصل معنا</h1>
        <p class="subtitle" id="subtitle">هل لديك سؤال أو استفسار؟ نحن هنا لمساعدتك في رحلتك لتعلم البرمجة.</p>

        <div class="contact-methods">
            <a href="https://www.facebook.com/share/1AQqjJ2PhS/" class="contact-card facebook" target="_blank">
                <div class="method-icon"><i class="fab fa-facebook-f"></i></div>
                <div class="method-info">
                    <h3 id="fbLabel">فيسبوك</h3>
                    <p>Bibars Horri</p>
                </div>
            </a>
            <a href="mailto:bibarss39@gmail.com" class="contact-card">
                <div class="method-icon"><i class="fas fa-envelope"></i></div>
                <div class="method-info">
                    <h3 id="mailLabel">البريد الإلكتروني</h3>
                    <p>bibarss39@gmail.com</p>
                </div>
            </a>
        </div>

        <a href="asasi.html" class="btn-home">
            <i class="fas fa-home"></i>
            <span id="homeBtn">العودة للرئيسية</span>
        </a>
    </div>

    <script>
        const translations = {
            ar: {
                title: "تواصل معنا",
                subtitle: "هل لديك سؤال أو استفسار؟ نحن هنا لمساعدتك في رحلتك لتعلم البرمجة.",
                fbLabel: "فيسبوك",
                mailLabel: "البريد الإلكتروني",
                homeBtn: "العودة للرئيسية"
            },
            en: {
                title: "Contact Us",
                subtitle: "Have a question? We're here to help you on your programming journey.",
                fbLabel: "Facebook",
                mailLabel: "Email",
                homeBtn: "Back to Home"
            },
            fr: {
                title: "Contactez-nous",
                subtitle: "Une question ? Nous sommes là pour vous aider dans votre apprentissage.",
                fbLabel: "Facebook",
                mailLabel: "E-mail",
                homeBtn: "Retour à l'accueil"
            }
        };

        function applyLang() {
            const lang = localStorage.getItem('lang') || 'ar';
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            const t = translations[lang];
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('fbLabel').textContent = t.fbLabel;
            document.getElementById('mailLabel').textContent = t.mailLabel;
            document.getElementById('homeBtn').textContent = t.homeBtn;
        }

        window.onload = applyLang;
    </script>
</body>
</html>
